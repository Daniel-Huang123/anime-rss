# 追番姬 zhuifanji — 配置示例
# 复制为 config.yaml 并修改以下内容

qbittorrent:
  host: localhost
  port: 8080
  username: admin
  password: your_password_here
  save_path: "D:/Anime"        # 下载保存根目录（也作为媒体库扫描路径）

# 字幕组优先级（名称包含关键词即匹配，不区分大小写）
subtitle_priorities:
  - ANi
  - kirara
  - 拨雪寻春
  - LoliHouse
  - 桜都字幕组

resource_check:
  recent_weeks: 4              # 判断"有资源"的时间窗口（周数）

cleanup:
  keep_quarters: 2             # 保留最近 N 个季度
  delete_files: true

advanced:
  use_mirror: false            # 使用 mikanime.tv 镜像
  request_delay: 1.0           # 批量订阅请求间隔（秒）

ui:
  auto_refresh_enabled: false  # 开启后页面按固定间隔自动刷新
  auto_refresh_seconds: 30      # 自动刷新间隔（秒，建议 15~60）

# 媒体库会扫描 qbittorrent.save_path，并自动读取：
# - 运行目录 watch_history.json（从媒体库页面播放时写入）
# - PotPlayer 标准播放列表历史
# - Windows Recent Files（兜底）
